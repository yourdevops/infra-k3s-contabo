---
- name: Configure repo credentials
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    resource_definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: repo-infra-k3s-contabo
        namespace: argocd
        labels:
          argocd.argoproj.io/secret-type: repository
      stringData:
        type: git
        url: git@github.com:yourdevops/infra-k3s-contabo.git
        sshPrivateKey: "{{ vault_argocd_repo_private_key }}"

- name: Apply root Application
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig }}"
    state: present
    resource_definition:
      apiVersion: argoproj.io/v1alpha1
      kind: Application
      metadata:
        name: root
        namespace: argocd
      spec:
        project: default
        source:
          repoURL: git@github.com:yourdevops/infra-k3s-contabo.git
          targetRevision: main
          path: argocd/
          directory:
            recurse: true
            # Repo-wide conventions for the root walker:
            # - kustomization.yaml belongs to a kustomize child tree (consumed
            #   by its own Application), never applied by the root walker.
            # - *.json files in this repo are data content (dashboards,
            #   configmap sources), not Kubernetes manifests — manifests are
            #   always YAML here. This keeps the walker forward-compatible
            #   with new kustomize sub-apps without touching this exclude.
            exclude: "{**/kustomization.yaml,**/*.json}"
        destination:
          server: https://kubernetes.default.svc
        syncPolicy:
          automated:
            selfHeal: false
            prune: true
          syncOptions:
            - SkipDryRunOnMissingResource=true
            - ServerSideApply=true
          retry:
            limit: 5
            backoff:
              duration: 30s
              factor: 2
              maxDuration: 5m
