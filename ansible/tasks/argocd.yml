---
- name: Add ArgoCD Helm repository
  kubernetes.core.helm_repository:
    name: argo
    repo_url: https://argoproj.github.io/argo-helm

- name: Install ArgoCD
  kubernetes.core.helm:
    release_name: argocd
    chart_ref: argo/argo-cd
    release_namespace: argocd
    chart_version: "{{ argocd_chart_version }}"
    create_namespace: true
    kubeconfig: "{{ kubeconfig }}"
    wait: true
    wait_timeout: 5m0s
    release_values:
      configs:
        cm:
          exec.enabled: true
        params:
          server.insecure: true  # TLS terminates at Cloudflare edge
        rbac:
          policy.csv: |
            p, role:admin, exec, create, */*, allow
      controller:
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi
      server:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
        extensions:
          enabled: true
          extensionList:
            - name: rollout-extension
              env:
                - name: EXTENSION_URL
                  value: https://github.com/argoproj-labs/rollout-extension/releases/download/v0.3.7/extension.tar
      repoServer:
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
      applicationSet:
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 128Mi
      notifications:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi
      redis:
        resources:
          requests:
            cpu: 25m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
      dex:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
