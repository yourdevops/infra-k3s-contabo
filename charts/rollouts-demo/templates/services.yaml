---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rollouts-demo.name" . }}-stable
  labels:
    {{- include "rollouts-demo.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "rollouts-demo.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rollouts-demo.name" . }}-canary
  labels:
    {{- include "rollouts-demo.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "rollouts-demo.selectorLabels" . | nindent 4 }}
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
{{- if .Values.gateway.internal.enabled }}
---
# East-west shim: ExternalName Service resolves to the internal Envoy Gateway.
# Callers use the native cluster DNS name
#   {{ include "rollouts-demo.name" . }}.{{ .Release.Namespace }}.svc.cluster.local
# which CoreDNS turns into a CNAME to the internal Envoy Service. The HTTP
# request arrives at Envoy with the original Host header; the HTTPRoute
# matches on that hostname and routes to stable/canary by weight.
# See ADR-014.
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rollouts-demo.name" . }}
  labels:
    {{- include "rollouts-demo.labels" . | nindent 4 }}
    rollouts-demo/purpose: east-west-shim
spec:
  type: ExternalName
  externalName: {{ .Values.gateway.internal.serviceFqdn }}
  ports:
    - port: 80
      protocol: TCP
{{- end }}
