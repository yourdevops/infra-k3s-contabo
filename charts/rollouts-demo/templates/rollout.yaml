apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "rollouts-demo.name" . }}
  labels:
    {{- include "rollouts-demo.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "rollouts-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rollouts-demo.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: rollouts-demo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 3
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
  strategy:
    {{- if eq .Values.strategy "blueGreen" }}
    blueGreen:
      activeService: {{ include "rollouts-demo.name" . }}-active
      previewService: {{ include "rollouts-demo.name" . }}-preview
      autoPromotionEnabled: {{ .Values.blueGreen.autoPromotionEnabled }}
      {{- if .Values.analysis.enabled }}
      prePromotionAnalysis:
        templates:
          {{- if .Values.analysis.prometheus.address }}
          - templateName: {{ include "rollouts-demo.name" . }}-success-rate
          {{- else }}
          - templateName: {{ include "rollouts-demo.name" . }}-health
          {{- end }}
        args:
          {{- if .Values.analysis.prometheus.address }}
          - name: route-name
            value: {{ include "rollouts-demo.name" . }}
          {{- else }}
          - name: canary-url
            value: http://{{ include "rollouts-demo.name" . }}-preview.{{ .Release.Namespace }}.svc.cluster.local/color
          {{- end }}
      {{- end }}
    {{- else }}
    canary:
      dynamicStableScale: {{ .Values.canary.dynamicStableScale }}
      canaryService: {{ include "rollouts-demo.name" . }}-canary
      stableService: {{ include "rollouts-demo.name" . }}-stable
      trafficRouting:
        {{- with .Values.canary.managedRoutes }}
        managedRoutes:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .Values.canary.trafficRouting }}
        {{- toYaml .Values.canary.trafficRouting | nindent 8 }}
        {{- else }}
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: {{ include "rollouts-demo.name" . }}
            namespace: {{ .Release.Namespace }}
        {{- end }}
      steps:
        {{- toYaml .Values.canary.steps | nindent 8 }}
      {{- if .Values.analysis.enabled }}
      analysis:
        templates:
          {{- if .Values.analysis.prometheus.address }}
          - templateName: {{ include "rollouts-demo.name" . }}-canary-health
          - templateName: {{ include "rollouts-demo.name" . }}-success-rate
          {{- else }}
          - templateName: {{ include "rollouts-demo.name" . }}-health
          {{- end }}
        startingStep: {{ .Values.analysis.startingStep }}
        args:
          {{- if .Values.analysis.prometheus.address }}
          - name: route-name
            value: {{ include "rollouts-demo.name" . }}
          {{- else }}
          - name: canary-url
            value: http://{{ include "rollouts-demo.name" . }}-canary.{{ .Release.Namespace }}.svc.cluster.local/color
          {{- end }}
      {{- end }}
    {{- end }}
