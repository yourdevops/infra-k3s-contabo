apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "rollouts-demo.name" . }}
  labels:
    {{- include "rollouts-demo.labels" . | nindent 4 }}
spec:
  {{- with .Values.replicas }}
  replicas: {{ . }}
  {{- end }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      {{- include "rollouts-demo.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "rollouts-demo.selectorLabels" . | nindent 8 }}
    spec:
      terminationGracePeriodSeconds: 45
      containers:
        - name: rollouts-demo
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: OTEL_SERVICE_NAME
              value: {{ include "rollouts-demo.name" . }}
            {{- with .Values.env }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          startupProbe:
            httpGet:
              path: /
              port: http
            failureThreshold: 3
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            failureThreshold: 2
          livenessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
  strategy:
    canary:
      dynamicStableScale: {{ .Values.canary.dynamicStableScale }}
      canaryService: {{ include "rollouts-demo.name" . }}-canary
      stableService: {{ include "rollouts-demo.name" . }}-stable
      trafficRouting:
        {{- with .Values.canary.managedRoutes }}
        managedRoutes:
          {{- toYaml . | nindent 10 }}
        {{- end }}
        {{- if .Values.canary.trafficRouting }}
        {{- toYaml .Values.canary.trafficRouting | nindent 8 }}
        {{- else }}
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: {{ include "rollouts-demo.name" . }}
            namespace: {{ .Release.Namespace }}
        {{- end }}
      steps:
        {{- toYaml .Values.canary.steps | nindent 8 }}
      {{- if and .Values.analysisTemplate.globalSuccessRate.create .Values.analysisTemplate.globalSuccessRate.prometheus.address }}
      analysis:
        templates:
          - templateName: {{ include "rollouts-demo.name" . }}-global-success-rate
        startingStep: {{ .Values.analysisTemplate.globalSuccessRate.startingStep }}
        args:
          - name: route-name
            value: {{ include "rollouts-demo.name" . }}
      {{- end }}
