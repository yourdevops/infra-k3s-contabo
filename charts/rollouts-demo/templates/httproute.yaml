{{- if .Values.gateway.enabled }}
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "rollouts-demo.name" . }}
  labels:
    {{- include "rollouts-demo.labels" . | nindent 4 }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.name }}
      namespace: {{ .Values.gateway.namespace }}
      sectionName: {{ .Values.gateway.sectionName }}
    {{- if .Values.gateway.internal.enabled }}
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.gateway.internal.name }}
      namespace: {{ .Values.gateway.internal.namespace }}
      sectionName: {{ .Values.gateway.internal.sectionName }}
    {{- end }}
  hostnames:
    - {{ .Values.hostname }}
    {{- if .Values.gateway.internal.enabled }}
    # East-west hostname: callers in-cluster reach this HTTPRoute via the
    # ExternalName shim Service, which resolves to the internal Envoy
    # Gateway. The Host header they send matches this entry.
    - {{ include "rollouts-demo.name" . }}.{{ .Release.Namespace }}.svc.cluster.local
    {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "rollouts-demo.name" . }}-stable
          port: 80
          weight: 100
        - group: ""
          kind: Service
          name: {{ include "rollouts-demo.name" . }}-canary
          port: 80
          weight: 0
{{- end }}
