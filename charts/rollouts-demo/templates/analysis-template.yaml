{{- if and .Values.analysisTemplate.globalSuccessRate.create .Values.analysisTemplate.globalSuccessRate.prometheus.address }}
# Background check — queries the main weighted route (rule/0) via Envoy metrics
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "rollouts-demo.name" . }}-global-success-rate
  labels:
    {{- include "rollouts-demo.labels" . | nindent 4 }}
spec:
  args:
    - name: route-name
  metrics:
    - name: route-success-rate
      interval: {{ .Values.analysisTemplate.globalSuccessRate.interval }}
      {{- with .Values.analysisTemplate.globalSuccessRate.count }}
      count: {{ . }}
      {{- end }}
      failureLimit: {{ .Values.analysisTemplate.globalSuccessRate.failureLimit }}
      successCondition: "len(result) == 0 || result[0] >= {{ .Values.analysisTemplate.globalSuccessRate.prometheus.successThreshold }}"
      provider:
        prometheus:
          address: {{ .Values.analysisTemplate.globalSuccessRate.prometheus.address }}
          query: |
            {{- if .Values.analysisTemplate.globalSuccessRate.prometheus.query }}
            {{ .Values.analysisTemplate.globalSuccessRate.prometheus.query | nindent 12 }}
            {{- else }}
            sum(rate(envoy_cluster_upstream_rq_xx{envoy_cluster_name=~".*{{ "{{args.route-name}}" }}/rule/0",envoy_response_code_class="2"}[1m]))
            /
            sum(rate(envoy_cluster_upstream_rq_xx{envoy_cluster_name=~".*{{ "{{args.route-name}}" }}/rule/0"}[1m]))
            {{- end }}
{{- end }}
{{- if .Values.analysisTemplate.canaryProbe.create }}
---
# Direct canary pod probe — hits the canary service endpoint, bypasses Envoy metrics
apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: {{ include "rollouts-demo.name" . }}-canary-probe
  labels:
    {{- include "rollouts-demo.labels" . | nindent 4 }}
spec:
  metrics:
    - name: canary-app-response
      interval: {{ .Values.analysisTemplate.canaryProbe.interval }}
      count: {{ .Values.analysisTemplate.canaryProbe.count }}
      failureLimit: {{ .Values.analysisTemplate.canaryProbe.failureLimit }}
      provider:
        web:
          url: "http://{{ include "rollouts-demo.name" . }}-canary.{{ .Release.Namespace }}.svc.cluster.local{{ .Values.analysisTemplate.canaryProbe.path }}"
          method: {{ .Values.analysisTemplate.canaryProbe.method }}
          timeoutSeconds: {{ .Values.analysisTemplate.canaryProbe.timeoutSeconds }}
{{- end }}
