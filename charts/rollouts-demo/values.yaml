image:
  repository: argoproj/rollouts-demo
  tag: blue

replicas: 3

# canary | blueGreen
strategy: canary

gateway:
  enabled: false
  name: ""
  namespace: ""
  sectionName: ""

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}

hostname: ""

canary:
  dynamicStableScale: true
  # Override the trafficRouting block in the Rollout spec.
  # When empty, defaults to the Gateway API plugin (using gateway values above).
  # For ALB: { alb: { ingress: <release-name>, servicePort: 80 } }
  trafficRouting: {}
  steps:
    - setCanaryScale:
        matchTrafficWeight: true
    - setWeight: 5
    - pause:
        duration: 30s
    - setWeight: 20
    - pause:
        duration: 30s
    - setWeight: 50
    - pause:
        duration: 30s
    - setWeight: 80
    - pause:
        duration: 30s
  managedRoutes: []

# ── KEDA autoscaling ────────────────────────────────────────────
# Requires KEDA operator in the cluster (argocd/infra/keda.yaml).
# Creates a ScaledObject that targets the Rollout's /scale subresource.
# KEDA manages the HPA — do NOT create a separate HPA resource.
keda:
  enabled: false
  minReplicas: 3
  maxReplicas: 10
  pollingInterval: 15                   # how often KEDA checks metrics (seconds)
  cooldownPeriod: 120                   # seconds before scaling down after last trigger
  triggers:
    # RPS from app-level Prometheus metrics (requires instrumented image)
    - type: prometheus
      metadata:
        serverAddress: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
        query: sum(rate(http_requests_total{namespace="canary-demo"}[1m]))
        threshold: "50"                 # target RPS per replica
        activationThreshold: "5"        # don't activate below 5 RPS total
    # CPU as a safety net alongside RPS
    - type: cpu
      metricType: Utilization
      metadata:
        value: "70"
    # Memory as a safety net
    - type: memory
      metricType: Utilization
      metadata:
        value: "80"
  advanced:
    horizontalPodAutoscalerConfig:
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 30
          policies:
            - type: Percent
              value: 50
              periodSeconds: 30
            - type: Pods
              value: 2
              periodSeconds: 30
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 120
          policies:
            - type: Percent
              value: 25
              periodSeconds: 60
          selectPolicy: Max

blueGreen:
  autoPromotionEnabled: false
  previewHostname: ""

migrationJob:
  enabled: false

analysisTemplate:
  globalSuccessRate:
    create: false
    interval: 10s
    failureLimit: 1
    startingStep: 2
    prometheus:
      address: ""           # e.g. http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
      query: ""             # custom PromQL (optional, uses default Envoy success-rate query if empty)
      successThreshold: 0.95
  canaryProbe:
    create: false
    method: GET             # GET or POST; GET triggers env-var-based error simulation
    path: /color            # app endpoint to probe (returns 200 or 500)
    timeoutSeconds: 3
    count: 5                # probes per run (inline analysis must be finite)
    interval: 10s
    failureLimit: 1
