image:
  repository: argoproj/rollouts-demo
  tag: blue

replicas: 3

# canary | blueGreen
strategy: canary

gateway:
  enabled: false
  name: ""
  namespace: ""
  sectionName: ""

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}

hostname: ""

canary:
  dynamicStableScale: true
  # Override the trafficRouting block in the Rollout spec.
  # When empty, defaults to the Gateway API plugin (using gateway values above).
  # For ALB: { alb: { ingress: <release-name>, servicePort: 80 } }
  trafficRouting: {}
  steps:
    - setCanaryScale:
        matchTrafficWeight: true
    - setWeight: 5
    - pause:
        duration: 30s
    - setWeight: 20
    - pause:
        duration: 30s
    - setWeight: 50
    - pause:
        duration: 30s
    - setWeight: 80
    - pause:
        duration: 30s
  managedRoutes: []

blueGreen:
  autoPromotionEnabled: false
  previewHostname: ""

migrationJob:
  enabled: false

analysisTemplate:
  globalSuccessRate:
    create: false
    interval: 10s
    failureLimit: 1
    startingStep: 2
    prometheus:
      address: ""           # e.g. http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
      query: ""             # custom PromQL (optional, uses default Envoy success-rate query if empty)
      successThreshold: 0.95
  canaryProbe:
    create: false
    method: GET             # GET or POST; GET triggers env-var-based error simulation
    path: /color            # app endpoint to probe (returns 200 or 500)
    timeoutSeconds: 3
    count: 5                # probes per run (inline analysis must be finite)
    interval: 10s
    failureLimit: 1
