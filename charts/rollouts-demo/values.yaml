image:
  repository: argoproj/rollouts-demo
  tag: blue

replicas: 3

# canary | blueGreen
strategy: canary

gateway:
  enabled: false
  name: ""
  namespace: ""
  sectionName: ""

ingress:
  enabled: false
  ingressClassName: ""
  annotations: {}

hostname: ""

canary:
  dynamicStableScale: true
  # Override the trafficRouting block in the Rollout spec.
  # When empty, defaults to the Gateway API plugin (using gateway values above).
  # For ALB: { alb: { ingress: <release-name>, servicePort: 80 } }
  trafficRouting: {}
  steps:
    - setCanaryScale:
        matchTrafficWeight: true
    - setWeight: 5
    - pause:
        duration: 30s
    - setWeight: 20
    - pause:
        duration: 30s
    - setWeight: 50
    - pause:
        duration: 30s
    - setWeight: 80
    - pause:
        duration: 30s
  managedRoutes: []

blueGreen:
  autoPromotionEnabled: false
  previewHostname: ""

migrationJob:
  enabled: false

analysis:
  enabled: false
  interval: 10s
  failureLimit: 1
  startingStep: 2
  # Prometheus-based analysis (replaces web provider when set)
  prometheus:
    address: ""           # e.g. http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
    query: ""             # custom PromQL query (optional, uses default success-rate query if empty)
    successThreshold: 0.95
