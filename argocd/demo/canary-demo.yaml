---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:yourdevops/infra-k3s-contabo.git
    targetRevision: main
    path: charts/rollouts-demo
    helm:
      releaseName: canary-demo
      valuesObject:
        image:
          repository: argoproj/rollouts-demo
          tag: blue
        replicas: 3
        strategy: canary
        hostname: canary-demo.yourdevops.me
        gateway:
          name: traefik-gateway
          namespace: traefik
          sectionName: websecure
        canary:
          steps:
            - setWeight: 5
            - pause:
                duration: 5m
            - setWeight: 20
            - pause:
                duration: 5m
            - setWeight: 50
            - pause:
                duration: 5m
            - setWeight: 80
            - pause:
                duration: 5m
  destination:
    server: https://kubernetes.default.svc
    namespace: canary-demo
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
