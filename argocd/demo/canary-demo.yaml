---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:yourdevops/infra-k3s-contabo.git
    targetRevision: main
    path: charts/rollouts-demo
    helm:
      releaseName: canary-demo
      valuesObject:

        # ── Demo toggles ────────────────────────────────────────
        image:
          repository: argoproj/rollouts-demo
          tag: blue                      # blue, green, yellow, purple, orange, red -- all with bad-/slow- prefixes available
        replicas: 10
        strategy: canary
        hostname: canary-demo.yourdevops.me

        # ── Gateway API routing ─────────────────────────────────
        gateway:
          enabled: true
          name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https

        # ── Pre-rollout migration job ───────────────────────────
        migrationJob:
          enabled: true

        # ── Automated analysis ──────────────────────────────────
        analysis:
          enabled: true                    # creates an AnalysisTemplate + inline backgroundAnalysis  
          interval: 10s
          failureLimit: 1
          startingStep: 2                  # analysis begins at the header phase (step 2: setHeaderRoute)
          prometheus:
            address: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
            successThreshold: 0.95

        # ── Canary strategy ─────────────────────────────────────
        canary:
          dynamicStableScale: true         # scale down stable pods as canary weight increases
          managedRoutes:
            - name: header-route
          steps:
            # OPTIONAL Phase 1 — header-based testing (Firefox only)
            # - setCanaryScale:
            #     replicas: 1                # spin up a single canary pod
            # - setWeight: 1                 # minimal traffic split - bug in controller does not allow to not set it (otherwise it falls back to 0 meaning no traffic at all goes to canary)
            - setHeaderRoute:              # route Firefox traffic to canary
                name: header-route
                match:
                  - headerName: User-Agent
                    headerValue:
                      regex: ".*Firefox.*"
            - pause: {}                    # wait for manual approval

            # Phase 2 — progressive weighted rollout
            - setCanaryScale:
                matchTrafficWeight: true   # canary pods scale with traffic %
            - setWeight: 5
            - pause:
                duration: 30s
            - setWeight: 20
            - pause:
                duration: 30s
            - setWeight: 50
            - pause:
                duration: 30s
            - setWeight: 80
            - pause:
                duration: 30s

  ignoreDifferences:
    - group: ""
      kind: Service
      jqPathExpressions:
        - .spec.selector["rollouts-pod-template-hash"]
  destination:
    server: https://kubernetes.default.svc
    namespace: canary-demo
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
