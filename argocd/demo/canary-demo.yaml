---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:yourdevops/infra-k3s-contabo.git
    targetRevision: main
    path: charts/rollouts-demo
    helm:
      releaseName: canary-demo
      valuesObject:
        image:
          repository: argoproj/rollouts-demo
          tag: green
        replicas: 3
        strategy: canary
        hostname: canary-demo.yourdevops.me
        gateway:
          enabled: true
          name: traefik-gateway
          namespace: traefik
          sectionName: websecure
        migrationJob:
          enabled: true
        analysis:
          enabled: true
          interval: 10s
          failureLimit: 1
          startingStep: 2
        canary:
          dynamicStableScale: true
          steps:
            - setCanaryScale:
                matchTrafficWeight: true
            - setWeight: 5
            - pause: {}
            - setWeight: 20
            - pause:
                duration: 30s
            - setWeight: 50
            - pause:
                duration: 30s
            - setWeight: 80
            - pause:
                duration: 30s
  destination:
    server: https://kubernetes.default.svc
    namespace: canary-demo
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
