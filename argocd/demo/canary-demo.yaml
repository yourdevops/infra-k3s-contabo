---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: canary-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:yourdevops/infra-k3s-contabo.git
    targetRevision: main
    path: charts/rollouts-demo
    helm:
      releaseName: canary-demo
      valuesObject:

        # ── Demo toggles ────────────────────────────────────────
        image:
          repository: argoproj/rollouts-demo
          tag: bad-yellow                    # blue, green, yellow, purple, orange, red -- all with bad-/slow- prefixes available
        replicas: 5
        strategy: canary
        hostname: canary-demo.yourdevops.me

        # ── Gateway API routing ─────────────────────────────────
        gateway:
          enabled: true
          name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https

        # ── Pre-rollout migration job ───────────────────────────
        migrationJob:
          enabled: true

        # ── AnalysisTemplates ───────────────────────────────────
        analysisTemplate:
          globalSuccessRate:               # background — Envoy weighted route metrics (stable + canary) via Prometheus
            create: true
            interval: 5s
            failureLimit: 2
            startingStep: 2                # step index where background analysis begins
            prometheus:
              address: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
              successThreshold: 0.95
          canaryProbe:                     # inline — direct HTTP probe of canary pod
            create: true
            method: GET                    # GET or POST; GET uses env-var error simulation only
            path: /color                   # rollouts-demo endpoint (returns 200 or 500)
            timeoutSeconds: 3
            count: 60                       # probes per run (inline must be finite)
            interval: 1s
            failureLimit: 3

        # ── Canary strategy ─────────────────────────────────────
        # https://argo-rollouts.readthedocs.io/en/stable/features/specification/
        canary:
          dynamicStableScale: true         # scale down stable pods as canary weight increases
          # Header-based routing (Firefox -> canary).
          # Firefox gets 100% canary throughout the entire rollout.
          managedRoutes:
            - name: header-route
          steps:
            # PHASE 1 — header-based testing (Firefox -> canary) and automated analysis gate
            - setCanaryScale:
                replicas: 1                # spin up a single canary pod
            - setHeaderRoute:
                name: header-route         # based on custom header, route traffic to the canary
                match:
                  - headerName: User-Agent
                    headerValue:
                      regex: ".*Firefox.*"

            # Automated gate — probe canary pod directly before shifting traffic
            - analysis:
                templates:
                  - templateName: canary-demo-canary-probe
            - pause: {}                    # verify canary manually via Firefox before proceeding
                # duration: 2m             # OR let it continue unattended after soaking for a couple of minutes

            # PHASE 2 — progressive weighted rollout
            - setWeight: 5
            - setCanaryScale:
                matchTrafficWeight: true   # canary pods scale with traffic %
            - pause:
                duration: 30s
            - setWeight: 20
            - pause:
                duration: 30s
            - setWeight: 50
            - pause:
                duration: 30s
            - setWeight: 80
            - pause:
                duration: 30s

  ignoreDifferences:
    - group: ""
      kind: Service
      jqPathExpressions:
        - .spec.selector["rollouts-pod-template-hash"]
    - group: argoproj.io
      kind: Rollout
      jqPathExpressions:
        - .spec.strategy.canary.analysis.analysisRunMetadata
        - .spec.strategy.canary.steps[].analysis.analysisRunMetadata
  destination:
    server: https://kubernetes.default.svc
    namespace: canary-demo
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
