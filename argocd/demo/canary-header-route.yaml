# Standalone header-pinning HTTPRoute for canary-demo.
# Routes Firefox traffic to the canary service regardless of rollout weight.
# Lives outside the Rollout spec so it persists through the entire rollout lifecycle.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: canary-demo-header-pin
  namespace: canary-demo
spec:
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - canary-demo.yourdevops.me
  rules:
    - matches:
        - headers:
            - name: User-Agent
              type: RegularExpression
              value: ".*Firefox.*"
          path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ""
          kind: Service
          name: canary-demo-canary
          port: 80
