---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: header-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:yourdevops/infra-k3s-contabo.git
    targetRevision: main
    path: charts/rollouts-demo
    helm:
      releaseName: header-demo
      valuesObject:
        image:
          repository: argoproj/rollouts-demo
          tag: green
        replicas: 3
        strategy: canary
        hostname: header-demo.yourdevops.me
        gateway:
          enabled: true
          name: traefik-gateway
          namespace: traefik
          sectionName: websecure
        migrationJob:
          enabled: true
        canary:
          managedRoutes:
            - name: header-route
          steps:
            - setCanaryScale:
                replicas: 1
            - setWeight: 1
            - setHeaderRoute:
                name: header-route
                match:
                  - headerName: User-Agent
                    headerValue:
                      regex: ".*Firefox.*"
            - pause: {}
            - setCanaryScale:
                matchTrafficWeight: true
            - setWeight: 20
            - pause:
                duration: 5m
            - setWeight: 50
            - pause:
                duration: 5m
            - setWeight: 80
            - pause:
                duration: 5m
  destination:
    server: https://kubernetes.default.svc
    namespace: header-demo
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
