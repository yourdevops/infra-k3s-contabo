---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: bg-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:yourdevops/infra-k3s-contabo.git
    targetRevision: main
    path: charts/rollouts-demo
    helm:
      releaseName: bg-demo
      valuesObject:
        image:
          repository: argoproj/rollouts-demo
          tag: blue
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
        replicas: 2
        strategy: blueGreen
        hostname: bg-demo.yourdevops.me
        gateway:
          enabled: true
          name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https
        migrationJob:
          enabled: true
        analysis:
          enabled: true
          count: 5
        blueGreen:
          autoPromotionEnabled: false
          previewHostname: bg-demo-preview.yourdevops.me
  destination:
    server: https://kubernetes.default.svc
    namespace: bg-demo
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
