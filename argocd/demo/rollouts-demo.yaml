---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rollouts-demo
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:yourdevops/infra-k3s-contabo.git
    targetRevision: main
    path: charts/rollouts-demo
    helm:
      releaseName: rollouts-demo
      valuesObject:

        # ── Demo toggles ────────────────────────────────────────
        image:
          repository: ghcr.io/yourdevops/rollouts-demo
          tag: purple                    # blue, green, yellow, purple, orange, red -- all with bad-/slow- prefixes available
          pullPolicy: Always
        hostname: rollouts-demo.yourdevops.me

        # ── OTel → Collector → VictoriaMetrics ──
        # OTEL_SERVICE_NAME is set automatically from Release.Name in the chart
        # Collector enriches with k8s metadata (pod, namespace, node) via k8sattributesprocessor
        env:
          - name: OTEL_EXPORTER_OTLP_ENDPOINT
            value: http://otel-collector.otel-collector.svc.cluster.local:4318
          - name: OTEL_METRIC_EXPORT_INTERVAL
            value: "15000"
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 64Mi

        # ── Gateway API routing ─────────────────────────────────
        gateway:
          enabled: true
          name: envoy-gateway
          namespace: envoy-gateway-system
          sectionName: https

        # ── Pre-rollout migration job ───────────────────────────
        migrationJob:
          enabled: true

        # ── AnalysisTemplates ───────────────────────────────────
        analysisTemplate:
          globalSuccessRate:               # background — OTel app success rate via VictoriaMetrics
            create: true
            interval: 5s
            failureLimit: 2
            startingStep: 2                # step index where background analysis begins
            prometheus:
              address: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
              # VM keeps OTel dot notation — quote metric/label names in PromQL
              query: |
                sum(rate({__name__="http.server.request.duration_count", "service.name"="rollouts-demo", "http.response.status_code"=~"2.."}[1m]))
                /
                sum(rate({__name__="http.server.request.duration_count", "service.name"="rollouts-demo"}[1m]))
              successThreshold: 0.95
          canaryProbe:                     # inline — direct HTTP probe of canary pod
            create: true
            method: GET                    # GET or POST; GET uses env-var error simulation only
            path: /color                   # rollouts-demo endpoint (returns 200 or 500)
            timeoutSeconds: 3
            count: 60                       # probes per run (inline must be finite)
            interval: 1s
            failureLimit: 3

        # ── KEDA autoscaling ─────────────────────────────────────
        # OTel metrics → VictoriaMetrics → KEDA (Prometheus trigger)
        # http.server.request.duration _count gives RPS; CPU/memory as safety nets
        keda:
          enabled: true                   # enable after load-testing single-pod saturation
          minReplicas: 3
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 120
          triggers:
            - type: prometheus
              metadata:
                serverAddress: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
                query: sum(rate({__name__="http.server.request.duration_count", "service.name"="rollouts-demo"}[1m]))
                threshold: "310"
                activationThreshold: "5"
            - type: cpu
              metricType: Utilization
              metadata:
                value: "70"

        # ── Canary strategy ─────────────────────────────────────
        # https://argo-rollouts.readthedocs.io/en/stable/features/specification/
        canary:
          dynamicStableScale: true         # scale down stable pods as canary weight increases
          # Header-based routing (Firefox -> canary).
          # Firefox gets 100% canary throughout the entire rollout.
          managedRoutes:
            - name: header-route
          steps:
            # PHASE 1 — header-based testing (Firefox -> canary) and automated analysis gate
            - setCanaryScale:
                replicas: 1                # spin up a single canary pod
            - setHeaderRoute:
                name: header-route         # based on custom header, route traffic to the canary
                match:
                  - headerName: User-Agent
                    headerValue:
                      regex: ".*Firefox.*"

            # Automated gate — probe canary pod directly before shifting traffic
            - analysis:
                templates:
                  - templateName: rollouts-demo-canary-probe
            - pause:                     # verify canary manually via Firefox, for demo purposes, before proceeding
                duration: 30s            # OR let it continue unattended after soaking for a couple of minutes

            # PHASE 2 — progressive weighted rollout
            - setWeight: 5
            - setCanaryScale:
                matchTrafficWeight: true   # canary pods scale with traffic %
            - pause:
                duration: 30s
            - setWeight: 20
            - pause:
                duration: 30s
            - setWeight: 50
            - pause: {}
            - setWeight: 80
            - pause:
                duration: 30s

  ignoreDifferences:
    - group: ""
      kind: Service
      jqPathExpressions:
        - .spec.selector["rollouts-pod-template-hash"]
    - group: argoproj.io
      kind: Rollout
      jqPathExpressions:
        - .spec.replicas
        - .spec.strategy.canary.analysis.analysisRunMetadata
        - .spec.strategy.canary.steps[].analysis.analysisRunMetadata
  destination:
    server: https://kubernetes.default.svc
    namespace: rollouts-demo
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
