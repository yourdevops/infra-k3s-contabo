---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-yourdevops-me
  namespace: kong
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  secretName: wildcard-yourdevops-me-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  dnsNames:
    - "*.yourdevops.me"
    - "yourdevops.me"
