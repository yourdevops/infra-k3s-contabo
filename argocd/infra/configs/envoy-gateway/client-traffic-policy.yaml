---
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: ClientTrafficPolicy
metadata:
  name: cloudflare-trusted-proxy
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: envoy-gateway-public
  clientIPDetection:
    xForwardedFor:
      numTrustedHops: 1
  tls:
    clientValidation:
      optional: false
      caCertificateRefs:
        - group: ""
          kind: ConfigMap
          name: cloudflare-origin-ca
          namespace: envoy-gateway-system
