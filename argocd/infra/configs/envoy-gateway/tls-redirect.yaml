---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: tls-redirect
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  parentRefs:
    - name: envoy-gateway
      sectionName: http
  hostnames:
    - "*.yourdevops.me"
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
