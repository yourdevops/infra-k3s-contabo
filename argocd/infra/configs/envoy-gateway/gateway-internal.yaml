---
# Internal Envoy Gateway — east-west (service-to-service) L7 router.
# Runs a separate Envoy deployment from the external gateway so per-endpoint metrics and failure domains are isolated.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-proxy-internal
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  telemetry:
    metrics:
      # Emit per-pod metrics (`envoy_cluster_endpoint_upstream_rq_*`) so that
      # short-lived canary pods stay observable at the gateway level, even if
      # they die before the app's OTel SDK gets a chance to export.
      enablePerEndpointStats: true
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
        pod:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "19001"
            prometheus.io/path: "/stats/prometheus"
      envoyService:
        type: ClusterIP
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway-internal
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy-proxy-internal
    namespace: envoy-gateway-system
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-gateway-internal
  namespace: envoy-gateway-system
  labels:
    scope: internal
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  gatewayClassName: envoy-gateway-internal
  infrastructure:
    parametersRef:
      group: gateway.envoyproxy.io
      kind: EnvoyProxy
      name: envoy-proxy-internal
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
---
# Stable DNS name for the internal Envoy.
# Envoy Gateway auto-generates a Service with a hash-based name
# (envoy-envoy-gateway-system-envoy-gateway-internal-<hash>).  We also
# create this selector-based Service so HTTPRoute ExternalName shims
# can point at a predictable FQDN:
#   envoy-gateway-internal.envoy-gateway-system.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: envoy-gateway-internal
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/component: proxy
    app.kubernetes.io/managed-by: envoy-gateway
    app.kubernetes.io/name: envoy
    gateway.envoyproxy.io/owning-gateway-name: envoy-gateway-internal
    gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway-system
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 10080
