---
# CA certificate for Cloudflare Authenticated Origin Pulls.
# Envoy Gateway validates client certs against this CA.
# This is a public certificate — safe to commit to a public repo.
#
# Populate ca.crt from Terraform:
#   terraform -chdir=terraform/cloudflare output -raw aop_ca_cert_pem
#
# On CA rotation (after terraform apply), update the value below and push.
