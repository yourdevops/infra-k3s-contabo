---
# Public Envoy Gateway — north-south (internet-facing) L7 router.
# Runs a separate Envoy deployment from the internal gateway so per-endpoint metrics and failure domains are isolated.
# Attached to every Gateway via the GatewayClass parametersRef
# (see gatewayclass.yaml), unless a Gateway overrides with its own EnvoyProxy.
apiVersion: gateway.envoyproxy.io/v1alpha1
kind: EnvoyProxy
metadata:
  name: envoy-proxy-public
  namespace: envoy-gateway-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  telemetry:
    metrics:
      # Emit per-pod metrics (`envoy_cluster_endpoint_upstream_rq_*`) so that
      # short-lived canary pods stay observable at the gateway level, even if
      # they die before the app's OTel SDK gets a chance to export.
      enablePerEndpointStats: true
  provider:
    type: Kubernetes
    kubernetes:
      envoyDeployment:
        replicas: 2
        container:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 256Mi
        pod:
          annotations:
            prometheus.io/scrape: "true"
            prometheus.io/port: "19001"
            prometheus.io/path: "/stats/prometheus"
      envoyService:
        type: LoadBalancer
---
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway-public
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
  parametersRef:
    group: gateway.envoyproxy.io
    kind: EnvoyProxy
    name: envoy-proxy-public
    namespace: envoy-gateway-system
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: envoy-gateway-public
  namespace: envoy-gateway-system
  labels:
    scope: public
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  gatewayClassName: envoy-gateway-public
  listeners:
    - name: http
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      port: 443
      protocol: HTTPS
      hostname: "*.yourdevops.me"
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: wildcard-yourdevops-me-tls
      allowedRoutes:
        namespaces:
          from: All
