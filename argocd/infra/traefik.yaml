---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "39.0.6"
    # Values ref: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
    helm:
      valuesObject:
        global:
          checkNewVersion: false
          sendAnonymousUsage: false
        providers:
          kubernetesIngress:
            enabled: true
          kubernetesGateway:
            enabled: true
        tlsStore:
          default:
            defaultCertificate:
              secretName: wildcard-yourdevops-me-tls
        gateway:
          enabled: true
          listeners:
            web:
              port: 8000        # container port (chart maps to Service port 80 via ports.web.exposedPort)
              protocol: HTTP
              namespacePolicy:
                from: All
            websecure:
              port: 8443        # container port (chart maps to Service port 443 via ports.websecure.exposedPort)
              protocol: HTTPS
              hostname: "*.yourdevops.me"
              namespacePolicy:
                from: All
              certificateRefs:
                - name: wildcard-yourdevops-me-tls
        ports:
          web:
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
            observability:
              accessLogs: false
          websecure:
            forwardedHeaders:
              trustedIPs:
                # Cloudflare IPv4
                - 173.245.48.0/20
                - 103.21.244.0/22
                - 103.22.200.0/22
                - 103.31.4.0/22
                - 141.101.64.0/18
                - 108.162.192.0/18
                - 190.93.240.0/20
                - 188.114.96.0/20
                - 197.234.240.0/22
                - 198.41.128.0/17
                - 162.158.0.0/15
                - 104.16.0.0/13
                - 104.24.0.0/14
                - 172.64.0.0/13
                - 131.0.72.0/22
                # Cloudflare IPv6
                - 2400:cb00::/32
                - 2606:4700::/32
                - 2803:f800::/32
                - 2405:b500::/32
                - 2405:8100::/32
                - 2a06:98c0::/29
                - 2c0f:f248::/32
        logs:
          access:
            enabled: true
            format: json
        service:
          type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
