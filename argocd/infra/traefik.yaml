---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: "39.0.6"
    # Values ref: https://github.com/traefik/traefik-helm-chart/blob/master/traefik/values.yaml
    helm:
      valuesObject:
        global:
          checkNewVersion: false
          sendAnonymousUsage: false
        providers:
          kubernetesGateway:
            enabled: true
        gateway:
          enabled: true
          listeners:
            web:
              port: 8000        # container port (chart maps to Service port 80 via ports.web.exposedPort)
              protocol: HTTP
              namespacePolicy:
                from: All
            websecure:
              port: 8443        # container port (chart maps to Service port 443 via ports.websecure.exposedPort)
              protocol: HTTPS
              hostname: "*.yourdevops.me"
              namespacePolicy:
                from: All
              certificateRefs:
                - name: wildcard-yourdevops-me-tls
        ports:
          web:
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
        logs:
          access:
            enabled: true
            format: json
        service:
          type: LoadBalancer
  destination:
    server: https://kubernetes.default.svc
    namespace: traefik
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
