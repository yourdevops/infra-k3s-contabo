---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-state-metrics
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-state-metrics
    targetRevision: "7.2.2"
    helm:
      valuesObject:
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 128Mi

        # Only monitor resource types we actually use
        collectors:
          - pods
          - replicasets
          - namespaces
          - nodes
          - horizontalpodautoscalers
          - jobs
          - statefulsets
          - daemonsets

        # Expose pod labels as metric labels so we can group by version
        metricLabelsAllowlist:
          - pods=[app.kubernetes.io/version,app.kubernetes.io/name]

        # Ensure VictoriaMetrics auto-discovers via kubernetes_sd
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "8080"
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-state-metrics
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
