---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    targetRevision: "11.6.0"
    helm:
      valuesObject:
        replicas: 1

        # deploymentStrategy:
        #   type: Recreate

        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

        persistence:
          enabled: true
          size: 5Gi

        initChownData:
          enabled: false

        grafana.ini:
          auth.anonymous:
            enabled: true
            org_role: Viewer

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: VictoriaMetrics
                type: prometheus
                uid: victoria-metrics
                url: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
                access: proxy
                isDefault: true
                editable: false

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default

        dashboards:
          default:
            rollouts-demo:
              json: |
                {
                  "uid": "rollouts-demo",
                  "title": "Canary Demo",
                  "tags": ["rollouts-demo", "otel"],
                  "editable": true,
                  "graphTooltip": 1,
                  "refresh": "5s",
                  "schemaVersion": 39,
                  "time": { "from": "now-15m", "to": "now" },
                  "panels": [
                    {
                      "id": 5,
                      "type": "timeseries",
                      "title": "Request Rate by Status",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 0 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "sum by (\"http.response.status_code\", \"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "{{http.response.status_code}} ({{service.version}})", "refId": "A" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "stacking": { "mode": "none" }, "axisBorderShow": true }
                        },
                        "overrides": [
                          { "matcher": { "id": "byName", "options": "200" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
                          { "matcher": { "id": "byName", "options": "500" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
                          { "matcher": { "id": "byName", "options": "404" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] }
                        ]
                      }
                    },
                    {
                      "id": 6,
                      "type": "timeseries",
                      "title": "Latency Percentiles",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 0 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "histogram_quantile(0.50, sum by (le, \"service.version\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "p50 ({{service.version}})", "refId": "A" },
                        { "expr": "histogram_quantile(0.95, sum by (le, \"service.version\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "p95 ({{service.version}})", "refId": "B" },
                        { "expr": "histogram_quantile(0.99, sum by (le, \"service.version\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "p99 ({{service.version}})", "refId": "C" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "ms",
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 7,
                      "type": "timeseries",
                      "title": "Replicas",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 10 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "count by (label_app_kubernetes_io_version) (kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\", label_app_kubernetes_io_version!=\"\"})", "legendFormat": "{{label_app_kubernetes_io_version}}", "refId": "A" }],
                      "options": { "legend": { "displayMode": "table", "calcs": ["lastNotNull"] } },
                      "fieldConfig": {
                        "defaults": {
                          "min": 0,
                          "custom": { "drawStyle": "staircase", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 4,
                      "type": "timeseries",
                      "title": "In-Flight Requests",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 10 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (\"service.version\") ({__name__=\"http.server.active_requests\", \"service.name\"=\"rollouts-demo\"})", "legendFormat": "{{service.version}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 2,
                      "type": "timeseries",
                      "title": "Error Rate 5xx",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 20 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\", \"http.response.status_code\"=~\"5..\"}[$__rate_interval]))\n/\nsum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "{{service.version}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "min": 0,
                          "max": 1,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 8,
                      "type": "timeseries",
                      "title": "Error Rate 4xx",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 20 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\", \"http.response.status_code\"=~\"4..\"}[$__rate_interval]))\n/\nsum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "{{service.version}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "min": 0,
                          "max": 1,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 11,
                      "type": "timeseries",
                      "title": "RPS per Pod",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 30 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (\"k8s.pod.name\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "{{k8s.pod.name}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 12,
                      "type": "timeseries",
                      "title": "p99 Latency per Pod",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 30 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "histogram_quantile(0.99, sum by (le, \"k8s.pod.name\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "{{k8s.pod.name}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "ms",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 19,
                      "type": "row",
                      "title": "Envoy Gateway (east-west routing layer)",
                      "collapsed": false,
                      "gridPos": { "h": 1, "w": 24, "x": 0, "y": 40 },
                      "panels": []
                    },
                    {
                      "id": 20,
                      "type": "timeseries",
                      "title": "Envoy: RPS per backend pod",
                      "description": "Per-endpoint request rate observed at both gateways. During a canary rollout, canary pods appear as new series; the rate split per pod reflects the HTTPRoute backendRefs weights applied by both gateways in lockstep. gw=external is Cloudflare-originated traffic; gw=internal is east-west cluster traffic via the ExternalName shim.",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 41 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "label_replace(label_replace(sum by (envoy_endpoint_address, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "{{envoy_endpoint_address}} ({{gw}})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 21,
                      "type": "timeseries",
                      "title": "Envoy: Status by code class",
                      "description": "Response-code class distribution at each gateway. Complements OTel app-level metrics with a routing-layer view.",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 41 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "label_replace(label_replace(sum by (envoy_response_code_class, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_xx{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "{{envoy_response_code_class}}xx ({{gw}})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "stacking": { "mode": "none" }, "axisBorderShow": true }
                        },
                        "overrides": [
                          { "matcher": { "id": "byRegexp", "options": "^2xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
                          { "matcher": { "id": "byRegexp", "options": "^4xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
                          { "matcher": { "id": "byRegexp", "options": "^5xx" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
                        ]
                      }
                    },
                    {
                      "id": 22,
                      "type": "timeseries",
                      "title": "Envoy: Error rate per backend pod",
                      "description": "Per-endpoint error ratio observed at each gateway. envoy_cluster_endpoint_rq_error counts upstream failures (connect failures, 5xx, reset).",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 51 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "label_replace(label_replace(\n  (sum by (envoy_endpoint_address, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_endpoint_rq_error{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))\n   /\n   sum by (envoy_endpoint_address, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))),\n  \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"),\n  \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "{{envoy_endpoint_address}} ({{gw}})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "min": 0,
                          "max": 1,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 23,
                      "type": "timeseries",
                      "title": "Envoy: Latency percentiles (cluster aggregate)",
                      "description": "p50/p95/p99 latency from each gateway's perspective. Envoy does not emit per-endpoint histograms; this is aggregated across all backend pods. External gateway latency includes the full Cloudflare round-trip to this cluster only when viewed externally; the values here measure just Envoy<->backend-pod time.",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 51 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "label_replace(label_replace(histogram_quantile(0.50, sum by (le, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "p50 ({{gw}})", "refId": "A" },
                        { "expr": "label_replace(label_replace(histogram_quantile(0.95, sum by (le, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "p95 ({{gw}})", "refId": "B" },
                        { "expr": "label_replace(label_replace(histogram_quantile(0.99, sum by (le, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "p99 ({{gw}})", "refId": "C" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "ms",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    }
                  ]
                }

  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true