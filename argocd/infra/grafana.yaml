---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    targetRevision: "11.6.0"
    helm:
      valuesObject:
        replicas: 1

        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

        persistence:
          enabled: false

        grafana.ini:
          auth.anonymous:
            enabled: true
            org_role: Viewer

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: VictoriaMetrics
                type: prometheus
                uid: victoria-metrics
                url: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
                access: proxy
                isDefault: true
                editable: false

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default

        dashboards:
          default:
            canary-demo:
              json: |
                {
                  "uid": "canary-demo",
                  "title": "Canary Demo",
                  "tags": ["canary-demo", "otel"],
                  "editable": true,
                  "graphTooltip": 1,
                  "refresh": "5s",
                  "schemaVersion": 39,
                  "time": { "from": "now-15m", "to": "now" },
                  "panels": [
                    {
                      "id": 1,
                      "type": "stat",
                      "title": "RPS",
                      "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum(rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"canary-demo\"}[$__rate_interval]))", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "decimals": 0,
                          "thresholds": { "steps": [
                            { "color": "green", "value": null },
                            { "color": "yellow", "value": 250 },
                            { "color": "red", "value": 400 }
                          ]}
                        }
                      },
                      "options": { "graphMode": "area", "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
                    },
                    {
                      "id": 2,
                      "type": "stat",
                      "title": "Error Rate",
                      "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "1 - (\n  sum(rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"canary-demo\", \"http.response.status_code\"=~\"2..\"}[$__rate_interval]))\n  /\n  sum(rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"canary-demo\"}[$__rate_interval]))\n)", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "decimals": 2,
                          "min": 0,
                          "max": 1,
                          "thresholds": { "steps": [
                            { "color": "green", "value": null },
                            { "color": "yellow", "value": 0.01 },
                            { "color": "red", "value": 0.05 }
                          ]}
                        }
                      },
                      "options": { "graphMode": "area", "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
                    },
                    {
                      "id": 3,
                      "type": "stat",
                      "title": "p99 Latency",
                      "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "histogram_quantile(0.99, sum by (le) (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"canary-demo\"}[$__rate_interval])))", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "s",
                          "decimals": 1,
                          "thresholds": { "steps": [
                            { "color": "green", "value": null },
                            { "color": "yellow", "value": 0.1 },
                            { "color": "red", "value": 0.5 }
                          ]}
                        }
                      },
                      "options": { "graphMode": "area", "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
                    },
                    {
                      "id": 4,
                      "type": "stat",
                      "title": "Active Requests",
                      "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum({__name__=\"http.server.active_requests\", \"service.name\"=\"canary-demo\"})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "decimals": 0,
                          "thresholds": { "steps": [
                            { "color": "green", "value": null },
                            { "color": "yellow", "value": 30 },
                            { "color": "red", "value": 80 }
                          ]}
                        }
                      },
                      "options": { "graphMode": "area", "colorMode": "value", "reduceOptions": { "calcs": ["lastNotNull"] } }
                    },
                    {
                      "id": 5,
                      "type": "timeseries",
                      "title": "Request Rate by Status",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 4 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "sum by (\"http.response.status_code\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"canary-demo\"}[$__rate_interval]))", "legendFormat": "{{ http.response.status_code }}", "refId": "A" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "stacking": { "mode": "none" } }
                        },
                        "overrides": [
                          { "matcher": { "id": "byName", "options": "200" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
                          { "matcher": { "id": "byName", "options": "500" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
                          { "matcher": { "id": "byName", "options": "404" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] }
                        ]
                      }
                    },
                    {
                      "id": 6,
                      "type": "timeseries",
                      "title": "Latency Percentiles",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 4 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "histogram_quantile(0.50, sum by (le) (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"canary-demo\"}[$__rate_interval])))", "legendFormat": "p50", "refId": "A" },
                        { "expr": "histogram_quantile(0.95, sum by (le) (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"canary-demo\"}[$__rate_interval])))", "legendFormat": "p95", "refId": "B" },
                        { "expr": "histogram_quantile(0.99, sum by (le) (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"canary-demo\"}[$__rate_interval])))", "legendFormat": "p99", "refId": "C" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "s",
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false }
                        },
                        "overrides": [
                          { "matcher": { "id": "byName", "options": "p50" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
                          { "matcher": { "id": "byName", "options": "p95" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
                          { "matcher": { "id": "byName", "options": "p99" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
                        ]
                      }
                    }
                  ]
                }

  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true