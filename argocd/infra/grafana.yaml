---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    targetRevision: "11.6.0"
    helm:
      valuesObject:
        replicas: 1

        # deploymentStrategy:
        #   type: Recreate

        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

        persistence:
          enabled: true
          size: 5Gi

        initChownData:
          enabled: false

        grafana.ini:
          auth.anonymous:
            enabled: true
            org_role: Viewer

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: VictoriaMetrics
                type: prometheus
                uid: victoria-metrics
                url: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
                access: proxy
                isDefault: true
                editable: false

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default

        dashboards:
          default:
            rollouts-demo:
              json: |
                {
                  "uid": "rollouts-demo",
                  "title": "Canary Demo",
                  "tags": ["rollouts-demo", "otel"],
                  "editable": true,
                  "graphTooltip": 1,
                  "refresh": "5s",
                  "schemaVersion": 39,
                  "time": { "from": "now-15m", "to": "now" },
                  "panels": [
                    {
                      "id": 100,
                      "type": "row",
                      "title": "kube-state-metrics — pod topology",
                      "collapsed": false,
                      "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
                      "panels": []
                    },
                    {
                      "id": 7,
                      "type": "timeseries",
                      "title": "Replicas",
                      "description": "Pod count per version label, scraped from kube_pod_labels. The authoritative inventory of what's running right now — OTel and Envoy views below should line up with this.",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 1 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "count by (label_app_kubernetes_io_version) (kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\", label_app_kubernetes_io_version!=\"\"})", "legendFormat": "{{label_app_kubernetes_io_version}}", "refId": "A" }],
                      "options": { "legend": { "displayMode": "table", "calcs": ["lastNotNull"] } },
                      "fieldConfig": {
                        "defaults": {
                          "min": 0,
                          "custom": { "drawStyle": "staircase", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 101,
                      "type": "row",
                      "title": "OTel — in-process application instrumentation (rollouts-demo → OTLP → VictoriaMetrics)",
                      "collapsed": false,
                      "gridPos": { "h": 1, "w": 24, "x": 0, "y": 11 },
                      "panels": []
                    },
                    {
                      "id": 5,
                      "type": "timeseries",
                      "title": "Request Rate by Status",
                      "description": "App-reported request rate per status code, split by service.version. Counts what the app actually served.",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 12 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "sum by (\"http.response.status_code\", \"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "{{http.response.status_code}} ({{service.version}})", "refId": "A" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "stacking": { "mode": "none" }, "axisBorderShow": true }
                        },
                        "overrides": [
                          { "matcher": { "id": "byName", "options": "200" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
                          { "matcher": { "id": "byName", "options": "500" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
                          { "matcher": { "id": "byName", "options": "404" }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] }
                        ]
                      }
                    },
                    {
                      "id": 6,
                      "type": "timeseries",
                      "title": "Latency Percentiles",
                      "description": "App-reported histogram quantiles per service.version, in milliseconds end-to-end inside the handler.",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 12 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "histogram_quantile(0.50, sum by (le, \"service.version\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "p50 ({{service.version}})", "refId": "A" },
                        { "expr": "histogram_quantile(0.95, sum by (le, \"service.version\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "p95 ({{service.version}})", "refId": "B" },
                        { "expr": "histogram_quantile(0.99, sum by (le, \"service.version\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "p99 ({{service.version}})", "refId": "C" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "ms",
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 4,
                      "type": "timeseries",
                      "title": "In-Flight Requests",
                      "description": "Concurrent requests being served per version, from the app's up/down counter.",
                      "gridPos": { "h": 10, "w": 8, "x": 0, "y": 22 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (\"service.version\") ({__name__=\"http.server.active_requests\", \"service.name\"=\"rollouts-demo\"})", "legendFormat": "{{service.version}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 2,
                      "type": "timeseries",
                      "title": "Error Rate 5xx",
                      "gridPos": { "h": 10, "w": 8, "x": 8, "y": 22 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\", \"http.response.status_code\"=~\"5..\"}[$__rate_interval]))\n/\nsum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "{{service.version}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "min": 0,
                          "max": 1,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 8,
                      "type": "timeseries",
                      "title": "Error Rate 4xx",
                      "gridPos": { "h": 10, "w": 8, "x": 16, "y": 22 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\", \"http.response.status_code\"=~\"4..\"}[$__rate_interval]))\n/\nsum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "{{service.version}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "min": 0,
                          "max": 1,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 11,
                      "type": "timeseries",
                      "title": "RPS per Pod",
                      "description": "App-reported request rate, keyed by k8s.pod.name resource attribute added by the OTel Collector's k8sattributesprocessor.",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 32 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (\"k8s.pod.name\", \"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "{{k8s.pod.name}} [{{service.version}}]", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 12,
                      "type": "timeseries",
                      "title": "p99 Latency per Pod",
                      "description": "App-reported p99 per pod. Envoy only emits per-cluster histograms, so this per-pod breakdown is the one OTel view without a direct Envoy equivalent.",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 32 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "histogram_quantile(0.99, sum by (le, \"k8s.pod.name\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "{{k8s.pod.name}}", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "ms",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 19,
                      "type": "row",
                      "title": "Envoy — gateway-observed metrics (same story one layer lower; north-south + east-west)",
                      "collapsed": false,
                      "gridPos": { "h": 1, "w": 24, "x": 0, "y": 42 },
                      "panels": []
                    },
                    {
                      "id": 21,
                      "type": "timeseries",
                      "title": "Envoy: Request Rate by Status",
                      "description": "Cluster-level request rate by exact response code, split per gateway. Mirrors OTel 'Request Rate by Status'. Envoy's per-endpoint stats don't carry the exact status code, so this is per-gateway aggregate only — version is not available on the x-axis here (see per-pod/per-version panels below that use endpoint success/error counters instead).",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 43 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "label_replace(label_replace(sum by (envoy_response_code, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "{{envoy_response_code}} ({{gw}})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "stacking": { "mode": "none" }, "axisBorderShow": true }
                        },
                        "overrides": [
                          { "matcher": { "id": "byRegexp", "options": "^2.." }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }] },
                          { "matcher": { "id": "byRegexp", "options": "^4.." }, "properties": [{ "id": "color", "value": { "fixedColor": "yellow", "mode": "fixed" } }] },
                          { "matcher": { "id": "byRegexp", "options": "^5.." }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] }
                        ]
                      }
                    },
                    {
                      "id": 23,
                      "type": "timeseries",
                      "title": "Envoy: Latency Percentiles (cluster aggregate)",
                      "description": "p50/p95/p99 latency per gateway, aggregated across all backend pods. Mirrors OTel 'Latency Percentiles' — but Envoy does not emit per-endpoint histograms, so version split (visible in OTel) is not reproducible here. Envoy values include the proxy hop, so they track slightly above the OTel in-handler values.",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 43 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "label_replace(label_replace(histogram_quantile(0.50, sum by (le, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "p50 ({{gw}})", "refId": "A" },
                        { "expr": "label_replace(label_replace(histogram_quantile(0.95, sum by (le, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "p95 ({{gw}})", "refId": "B" },
                        { "expr": "label_replace(label_replace(histogram_quantile(0.99, sum by (le, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "p99 ({{gw}})", "refId": "C" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "ms",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 24,
                      "type": "timeseries",
                      "title": "Envoy: In-Flight per version",
                      "description": "Per-version in-flight requests, assembled from envoy_cluster_endpoint_rq_active (a per-endpoint gauge) joined through kube_pod_info (pod_ip → pod uid) and kube_pod_labels (uid → version). Mirrors OTel 'In-Flight Requests'. The join chain is: envoy endpoint series → pod uid → version label.",
                      "gridPos": { "h": 10, "w": 8, "x": 0, "y": 53 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "label_replace(label_replace(\n  sum by (label_app_kubernetes_io_version, gateway_envoyproxy_io_owning_gateway_name) (\n    envoy_cluster_endpoint_rq_active{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}\n    * on (envoy_endpoint_address) group_left(uid)\n      label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n    * on (uid) group_left(label_app_kubernetes_io_version)\n      kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n  ),\n  \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"),\n  \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "{{label_app_kubernetes_io_version}} ({{gw}})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 22,
                      "type": "timeseries",
                      "title": "Envoy: Error Rate per version (5xx + upstream failures)",
                      "description": "Per-version error ratio. envoy_cluster_endpoint_rq_error is broader than OTel's 'Error Rate 5xx': it counts upstream 5xx, connect failures, resets, and timeouts — i.e., every case where Envoy failed to get a normal response from the pod. For a rollout gate this is operationally stronger than app-reported 5xx because it also catches pods that failed to accept traffic at all. Version comes from the kube-state-metrics join.",
                      "gridPos": { "h": 10, "w": 8, "x": 8, "y": 53 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "label_replace(label_replace(\n  (\n    sum by (label_app_kubernetes_io_version, gateway_envoyproxy_io_owning_gateway_name) (\n      rate(envoy_cluster_endpoint_rq_error{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n      * on (envoy_endpoint_address) group_left(uid)\n        label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n      * on (uid) group_left(label_app_kubernetes_io_version)\n        kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n    )\n    /\n    sum by (label_app_kubernetes_io_version, gateway_envoyproxy_io_owning_gateway_name) (\n      rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n      * on (envoy_endpoint_address) group_left(uid)\n        label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n      * on (uid) group_left(label_app_kubernetes_io_version)\n        kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n    )\n  ),\n  \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"),\n  \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "{{label_app_kubernetes_io_version}} ({{gw}})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "min": 0,
                          "max": 1,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 25,
                      "type": "timeseries",
                      "title": "Envoy: 4xx Rate (cluster aggregate)",
                      "description": "Per-gateway 4xx ratio from envoy_cluster_upstream_rq_xx. Mirrors OTel 'Error Rate 4xx', but Envoy does NOT tag 4xx to an endpoint (4xx is client fault, not upstream fault in Envoy's taxonomy), so per-version split is unavailable — this panel is cluster-level only.",
                      "gridPos": { "h": 10, "w": 8, "x": 16, "y": 53 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "label_replace(label_replace(\n  sum by (gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_xx{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\", envoy_response_code_class=\"4\"}[$__rate_interval]))\n  /\n  sum by (gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_completed{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])),\n  \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"),\n  \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "4xx ({{gw}})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "min": 0,
                          "max": 1,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 20,
                      "type": "timeseries",
                      "title": "Envoy: RPS per Pod",
                      "description": "Per-pod request rate enriched with version via the kube-state-metrics join (envoy_endpoint_address → pod_ip → uid → version). Summed across both gateways, so gw=external and gw=internal contributions collapse into a single line per pod. During canary, the per-pod rate reflects HTTPRoute weights divided by pod count, so stable and canary pods will sit at different RPS levels even at 50/50 weight if their replica counts differ (e.g., 3×stable at 15 rps vs 2×canary at 22 rps = 45/45 total).",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 63 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "sum by (exported_pod, label_app_kubernetes_io_version) (\n  rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  * on (envoy_endpoint_address) group_left(uid, exported_pod)\n    label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n  * on (uid) group_left(label_app_kubernetes_io_version)\n    kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n)", "legendFormat": "{{exported_pod}} [{{label_app_kubernetes_io_version}}]", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 26,
                      "type": "timeseries",
                      "title": "Envoy: Active requests per Pod",
                      "description": "Per-pod in-flight gauge — the closest Envoy offers to 'p99 Latency per Pod'. Envoy emits no per-endpoint latency histograms, so direct p99-per-pod is unavailable; however, a pod with elevated latency accumulates more concurrent in-flight requests (Little's law), making this a usable saturation proxy for spotting a slow pod during rollouts.",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 63 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [{ "expr": "label_replace(label_replace(\n  sum by (exported_pod, label_app_kubernetes_io_version, gateway_envoyproxy_io_owning_gateway_name) (\n    envoy_cluster_endpoint_rq_active{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}\n    * on (envoy_endpoint_address) group_left(uid, exported_pod)\n      label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n    * on (uid) group_left(label_app_kubernetes_io_version)\n      kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n  ),\n  \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"),\n  \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "{{exported_pod}} [{{label_app_kubernetes_io_version}}] ({{gw}})", "refId": "A" }],
                      "fieldConfig": {
                        "defaults": {
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    }
                  ]
                }

  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
