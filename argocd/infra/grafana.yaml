---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana-community.github.io/helm-charts
    chart: grafana
    targetRevision: "11.6.0"
    helm:
      valuesObject:
        replicas: 1

        # deploymentStrategy:
        #   type: Recreate

        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            cpu: "1"
            memory: 1Gi

        persistence:
          enabled: true
          size: 5Gi

        initChownData:
          enabled: false

        grafana.ini:
          auth.anonymous:
            enabled: true
            org_role: Viewer

        datasources:
          datasources.yaml:
            apiVersion: 1
            datasources:
              - name: VictoriaMetrics
                type: prometheus
                uid: victoria-metrics
                url: http://victoria-metrics-server.victoria-metrics.svc.cluster.local:8428
                access: proxy
                isDefault: true
                editable: false

        dashboardProviders:
          dashboardproviders.yaml:
            apiVersion: 1
            providers:
              - name: default
                orgId: 1
                type: file
                disableDeletion: false
                editable: true
                options:
                  path: /var/lib/grafana/dashboards/default

        dashboards:
          default:
            rollouts-demo:
              json: |
                {
                  "uid": "rollouts-demo",
                  "title": "Canary Demo",
                  "tags": ["rollouts-demo", "otel"],
                  "editable": true,
                  "graphTooltip": 1,
                  "refresh": "5s",
                  "schemaVersion": 39,
                  "time": { "from": "now-15m", "to": "now" },
                  "panels": [
                    {
                      "id": 100,
                      "type": "row",
                      "title": "Rollout health — promote/rollback view (Envoy-primary, OTel overlay)",
                      "collapsed": false,
                      "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 },
                      "panels": []
                    },
                    {
                      "id": 101,
                      "type": "timeseries",
                      "title": "Replicas by version",
                      "description": "Pod count per version label from kube_pod_labels. The authoritative inventory of what's running right now — the other three panels in this row should line up with this split.",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 1 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "count by (label_app_kubernetes_io_version) (kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\", label_app_kubernetes_io_version!=\"\"})", "legendFormat": "{{label_app_kubernetes_io_version}}", "refId": "A" }
                      ],
                      "options": { "legend": { "displayMode": "table", "calcs": ["lastNotNull"] } },
                      "fieldConfig": {
                        "defaults": {
                          "min": 0,
                          "custom": { "drawStyle": "staircase", "lineWidth": 2, "fillOpacity": 20, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        }
                      }
                    },
                    {
                      "id": 102,
                      "type": "timeseries",
                      "title": "Traffic: RPS by version",
                      "description": "Per-version request rate. Envoy (solid) is the primary source — works without app instrumentation and covers both gateways. OTel (dashed) overlay demonstrates convergence; pick either for rollout analysis.",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 1 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "sum by (label_app_kubernetes_io_version) (\n  rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  * on (envoy_endpoint_address) group_left(uid)\n    label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n  * on (uid) group_left(label_app_kubernetes_io_version)\n    kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n)", "legendFormat": "Envoy {{label_app_kubernetes_io_version}}", "refId": "A" },
                        { "expr": "sum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "OTel {{service.version}}", "refId": "B" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "reqps",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        },
                        "overrides": [
                          { "matcher": { "id": "byRegexp", "options": "^OTel .*" }, "properties": [{ "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } }] }
                        ]
                      }
                    },
                    {
                      "id": 103,
                      "type": "timeseries",
                      "title": "5xx rate by version",
                      "description": "Envoy rq_error (solid) is broader than OTel 5xx — it also counts upstream timeouts, connect failures, and resets. That makes it a stronger rollback signal because it catches pods that failed to accept traffic, which app-reported 5xx alone misses. OTel 5xx (dashed) shown for equivalence.",
                      "gridPos": { "h": 10, "w": 12, "x": 0, "y": 11 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "sum by (label_app_kubernetes_io_version) (\n  rate(envoy_cluster_endpoint_rq_error{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  * on (envoy_endpoint_address) group_left(uid)\n    label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n  * on (uid) group_left(label_app_kubernetes_io_version)\n    kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n)\n/\nsum by (label_app_kubernetes_io_version) (\n  rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  * on (envoy_endpoint_address) group_left(uid)\n    label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n  * on (uid) group_left(label_app_kubernetes_io_version)\n    kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n)", "legendFormat": "Envoy {{label_app_kubernetes_io_version}}", "refId": "A" },
                        { "expr": "sum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\", \"http.response.status_code\"=~\"5..\"}[$__rate_interval]))\n/\nsum by (\"service.version\") (rate({__name__=\"http.server.request.duration_count\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval]))", "legendFormat": "OTel {{service.version}}", "refId": "B" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "percentunit",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        },
                        "overrides": [
                          { "matcher": { "id": "byRegexp", "options": "^OTel .*" }, "properties": [{ "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } }] }
                        ]
                      }
                    },
                    {
                      "id": 104,
                      "type": "timeseries",
                      "title": "p99 / p50 latency by version",
                      "description": "OTel histogram percentiles per service.version, in-handler. p99 (solid) is the primary tail-latency signal for promote/rollback; p50 (dashed) is the typical-user context — a widening p99−p50 gap indicates tail skew without a baseline shift. OTel is used because Envoy histograms are cluster-scoped (stable + canary pool into one bucket — can't split by version) and Envoy-via-Little's-Law proved too noisy at low concurrency.",
                      "gridPos": { "h": 10, "w": 12, "x": 12, "y": 11 },
                      "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                      "targets": [
                        { "expr": "histogram_quantile(0.99, sum by (le, \"service.version\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "p99 {{service.version}}", "refId": "A" },
                        { "expr": "histogram_quantile(0.50, sum by (le, \"service.version\") (rate({__name__=\"http.server.request.duration_bucket\", \"service.name\"=\"rollouts-demo\"}[$__rate_interval])))", "legendFormat": "p50 {{service.version}}", "refId": "B" }
                      ],
                      "fieldConfig": {
                        "defaults": {
                          "unit": "ms",
                          "min": 0,
                          "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                        },
                        "overrides": [
                          { "matcher": { "id": "byRegexp", "options": "^p50 .*" }, "properties": [{ "id": "custom.lineStyle", "value": { "fill": "dash", "dash": [10, 10] } }] }
                        ]
                      }
                    },
                    {
                      "id": 200,
                      "type": "row",
                      "title": "Pod divergence — fires only when load balancing or a specific pod misbehaves",
                      "collapsed": true,
                      "gridPos": { "h": 1, "w": 24, "x": 0, "y": 21 },
                      "panels": [
                        {
                          "id": 201,
                          "type": "timeseries",
                          "title": "Pod load imbalance (max/avg RPS ratio per version)",
                          "description": "1.0 = perfectly balanced across pods within a version. Spikes ≥1.2 = one pod is getting hammered — LB issue or readiness-probe flapping.",
                          "gridPos": { "h": 10, "w": 8, "x": 0, "y": 22 },
                          "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                          "targets": [
                            { "expr": "max by (label_app_kubernetes_io_version) (\n  sum by (exported_pod, label_app_kubernetes_io_version) (\n    rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n    * on (envoy_endpoint_address) group_left(uid, exported_pod)\n      label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n    * on (uid) group_left(label_app_kubernetes_io_version)\n      kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n  )\n)\n/\navg by (label_app_kubernetes_io_version) (\n  sum by (exported_pod, label_app_kubernetes_io_version) (\n    rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n    * on (envoy_endpoint_address) group_left(uid, exported_pod)\n      label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n    * on (uid) group_left(label_app_kubernetes_io_version)\n      kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n  )\n)", "legendFormat": "{{label_app_kubernetes_io_version}}", "refId": "A" }
                          ],
                          "fieldConfig": {
                            "defaults": {
                              "unit": "short",
                              "min": 0,
                              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                            }
                          }
                        },
                        {
                          "id": 202,
                          "type": "timeseries",
                          "title": "Worst-pod saturation (max rq_active per version)",
                          "description": "Highest concurrent in-flight requests on any single pod, per version. By Little's Law, a slow pod accumulates in-flight — this is the 'slow pod detector' without per-endpoint histograms.",
                          "gridPos": { "h": 10, "w": 8, "x": 8, "y": 22 },
                          "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                          "targets": [
                            { "expr": "max by (label_app_kubernetes_io_version) (\n  sum by (exported_pod, label_app_kubernetes_io_version) (\n    envoy_cluster_endpoint_rq_active{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}\n    * on (envoy_endpoint_address) group_left(uid, exported_pod)\n      label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n    * on (uid) group_left(label_app_kubernetes_io_version)\n      kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n  )\n)", "legendFormat": "{{label_app_kubernetes_io_version}}", "refId": "A" }
                          ],
                          "fieldConfig": {
                            "defaults": {
                              "min": 0,
                              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                            }
                          }
                        },
                        {
                          "id": 203,
                          "type": "timeseries",
                          "title": "Worst-pod 5xx rate per version",
                          "description": "Worst single-pod error ratio per version. Catches one bad pod hiding inside a healthy fleet average.",
                          "gridPos": { "h": 10, "w": 8, "x": 16, "y": 22 },
                          "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                          "targets": [
                            { "expr": "max by (label_app_kubernetes_io_version) (\n  sum by (exported_pod, label_app_kubernetes_io_version) (\n    rate(envoy_cluster_endpoint_rq_error{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n    * on (envoy_endpoint_address) group_left(uid, exported_pod)\n      label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n    * on (uid) group_left(label_app_kubernetes_io_version)\n      kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n  )\n  /\n  sum by (exported_pod, label_app_kubernetes_io_version) (\n    rate(envoy_cluster_endpoint_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n    * on (envoy_endpoint_address) group_left(uid, exported_pod)\n      label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n    * on (uid) group_left(label_app_kubernetes_io_version)\n      kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n  )\n)", "legendFormat": "{{label_app_kubernetes_io_version}}", "refId": "A" }
                          ],
                          "fieldConfig": {
                            "defaults": {
                              "unit": "percentunit",
                              "min": 0,
                              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                            }
                          }
                        }
                      ]
                    },
                    {
                      "id": 300,
                      "type": "row",
                      "title": "Routing-layer detail — what Envoy gives you that plain ClusterIP + OTel can't (ADR-014)",
                      "collapsed": true,
                      "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 },
                      "panels": [
                        {
                          "id": 301,
                          "type": "timeseries",
                          "title": "Traffic by gateway (north-south vs east-west)",
                          "description": "Attributes traffic to north-south (Cloudflare → external gateway) vs east-west (in-cluster → internal gateway). Impossible with plain ClusterIP Services — the entire premise of ADR-014's internal gateway.",
                          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 33 },
                          "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                          "targets": [
                            { "expr": "label_replace(label_replace(\n  sum by (gateway_envoyproxy_io_owning_gateway_name) (\n    rate(envoy_cluster_upstream_rq_total{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  ),\n  \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"),\n  \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "{{gw}}", "refId": "A" }
                          ],
                          "fieldConfig": {
                            "defaults": {
                              "unit": "reqps",
                              "min": 0,
                              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                            }
                          }
                        },
                        {
                          "id": 302,
                          "type": "timeseries",
                          "title": "Failure mode breakdown per version",
                          "description": "OTel sees only 5xx. Envoy distinguishes timeouts (tail latency past deadline) vs non-timeout errors (upstream connect failures + resets + 5xx) vs success. During a rollout, knowing whether failures are timeouts or connect-refused or 5xx points at root cause.",
                          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 33 },
                          "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                          "targets": [
                            { "expr": "sum by (label_app_kubernetes_io_version) (\n  rate(envoy_cluster_endpoint_rq_timeout{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  * on (envoy_endpoint_address) group_left(uid)\n    label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n  * on (uid) group_left(label_app_kubernetes_io_version)\n    kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n)", "legendFormat": "timeout {{label_app_kubernetes_io_version}}", "refId": "A" },
                            { "expr": "sum by (label_app_kubernetes_io_version) (\n  rate(envoy_cluster_endpoint_rq_error{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  * on (envoy_endpoint_address) group_left(uid)\n    label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n  * on (uid) group_left(label_app_kubernetes_io_version)\n    kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n)\n-\nsum by (label_app_kubernetes_io_version) (\n  rate(envoy_cluster_endpoint_rq_timeout{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  * on (envoy_endpoint_address) group_left(uid)\n    label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n  * on (uid) group_left(label_app_kubernetes_io_version)\n    kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n)", "legendFormat": "error-non-timeout {{label_app_kubernetes_io_version}}", "refId": "B" },
                            { "expr": "sum by (label_app_kubernetes_io_version) (\n  rate(envoy_cluster_endpoint_rq_success{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])\n  * on (envoy_endpoint_address) group_left(uid)\n    label_replace(kube_pod_info{exported_namespace=\"rollouts-demo\"}, \"envoy_endpoint_address\", \"$1:8080\", \"pod_ip\", \"(.+)\")\n  * on (uid) group_left(label_app_kubernetes_io_version)\n    kube_pod_labels{exported_namespace=\"rollouts-demo\", label_app_kubernetes_io_name=\"rollouts-demo\"}\n)", "legendFormat": "success {{label_app_kubernetes_io_version}}", "refId": "C" }
                          ],
                          "fieldConfig": {
                            "defaults": {
                              "unit": "reqps",
                              "min": 0,
                              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "stacking": { "mode": "normal" }, "axisBorderShow": true }
                            },
                            "overrides": [
                              { "matcher": { "id": "byRegexp", "options": "^success .*" }, "properties": [{ "id": "color", "value": { "fixedColor": "green", "mode": "fixed" } }, { "id": "custom.fillOpacity", "value": 5 }] },
                              { "matcher": { "id": "byRegexp", "options": "^timeout .*" }, "properties": [{ "id": "color", "value": { "fixedColor": "red", "mode": "fixed" } }] },
                              { "matcher": { "id": "byRegexp", "options": "^error-non-timeout .*" }, "properties": [{ "id": "color", "value": { "fixedColor": "orange", "mode": "fixed" } }] }
                            ]
                          }
                        },
                        {
                          "id": 303,
                          "type": "timeseries",
                          "title": "4xx rate (cluster aggregate, anomaly detection only)",
                          "description": "Cluster-aggregate 4xx ratio per gateway. No version attribution — Envoy's endpoint counters don't tag 4xx (client fault, not upstream fault in Envoy's taxonomy). Kept for anomaly spotting; not actionable as a backend-health signal.",
                          "gridPos": { "h": 10, "w": 12, "x": 0, "y": 43 },
                          "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                          "targets": [
                            { "expr": "label_replace(label_replace(\n  sum by (gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_xx{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\", envoy_response_code_class=\"4\"}[$__rate_interval]))\n  /\n  sum by (gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_completed{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval])),\n  \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"),\n  \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "4xx ({{gw}})", "refId": "A" }
                          ],
                          "fieldConfig": {
                            "defaults": {
                              "unit": "percentunit",
                              "min": 0,
                              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 15, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                            }
                          }
                        },
                        {
                          "id": 304,
                          "type": "timeseries",
                          "title": "Envoy p99 latency (per gateway)",
                          "description": "Cluster-aggregate p99 from Envoy's per-gateway histograms. No per-version split — a single-rule HTTPRoute pools stable and canary pods into one Envoy cluster. The gap between external and internal reveals north-south vs east-west path latency (proxy hop + network + dispatch). Per-version p99 lives in Row 1 (OTel).",
                          "gridPos": { "h": 10, "w": 12, "x": 12, "y": 43 },
                          "datasource": { "type": "prometheus", "uid": "victoria-metrics" },
                          "targets": [
                            { "expr": "label_replace(label_replace(histogram_quantile(0.99, sum by (le, gateway_envoyproxy_io_owning_gateway_name) (rate(envoy_cluster_upstream_rq_time_bucket{envoy_cluster_name=\"httproute/rollouts-demo/rollouts-demo/rule/0\"}[$__rate_interval]))), \"gw\", \"internal\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway-internal$\"), \"gw\", \"external\", \"gateway_envoyproxy_io_owning_gateway_name\", \"^envoy-gateway$\")", "legendFormat": "p99 ({{gw}})", "refId": "A" }
                          ],
                          "fieldConfig": {
                            "defaults": {
                              "unit": "ms",
                              "min": 0,
                              "custom": { "drawStyle": "line", "lineWidth": 2, "fillOpacity": 10, "pointSize": 5, "spanNulls": false, "axisBorderShow": true }
                            }
                          }
                        }
                      ]
                    }
                  ]
                }

  destination:
    server: https://kubernetes.default.svc
    namespace: grafana
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
