---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-beyla
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://grafana.github.io/helm-charts
    chart: beyla
    targetRevision: "1.16.0"
    helm:
      valuesObject:
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 2
            memory: 1Gi

        # VictoriaMetrics auto-discovers via kubernetes_sd
        podAnnotations:
          prometheus.io/scrape: "true"
          prometheus.io/port: "9090"

        config:
          create: true
          data:
            attributes:
              kubernetes:
                enable: true
            prometheus_export:
              port: 9090
              path: /metrics
  destination:
    server: https://kubernetes.default.svc
    namespace: grafana-beyla
  syncPolicy:
    automated:
      selfHeal: false
      prune: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true